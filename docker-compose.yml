# docker-compose.yml – Qdrant vector database for the research-agent knowledge graph.
#
# Usage
# -----
#   Start:        docker compose up -d qdrant
#   Stop:         docker compose down
#   Logs:         docker compose logs -f qdrant
#   Reset:        docker compose down -v   (WARNING: deletes all stored vectors)
#   Pin version:  QDRANT_VERSION=v1.17.0 docker compose up -d
#
# Qdrant REST API + Web UI : http://localhost:6333
# Qdrant Web UI dashboard  : http://localhost:6333/dashboard
# Qdrant gRPC              : localhost:6334
#
# Environment variables (override in .env or shell):
#   QDRANT_VERSION       Image tag to use          (default: v1.17.0)
#   QDRANT_HTTP_PORT     Host-side REST/UI port    (default: 6333)
#   QDRANT_GRPC_PORT     Host-side gRPC port       (default: 6334)
#   QDRANT_MEMORY_LIMIT  Container memory cap      (default: 2g)
#
# Data is persisted in a named Docker volume: qdrant_data
# Production config mounted read-only from ./dockerfiles/qdrant/production.yaml

services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-v1.17.0}
    container_name: research-agent-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"   # REST API + Web UI
      - "${QDRANT_GRPC_PORT:-6334}:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
      - ./dockerfiles/qdrant/production.yaml:/qdrant/config/production.yaml:ro
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    deploy:
      resources:
        limits:
          memory: ${QDRANT_MEMORY_LIMIT:-2g}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qdrant_data:
    driver: local
